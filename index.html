<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basketball Clicker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Basketball Clicker</h1>
  
  <!-- Clickable Basketball -->
  <img id="basketball" src="images/basketball.png" alt="Click me!" style="width: 100px; cursor: pointer;" />

  <!-- Displays the number of buckets -->
  <p>Buckets: <span id="bucketCount">0</span></p>
  <p>Buckets per Second: <span id="bps">0</span></p>
  
  <h2>Upgrades</h2>
  <div id="upgradeButtons"></div>
  
  <h2>Special Boosts</h2>
  <button id="superShot" disabled>Super Shot Boost (100 buckets)</button>
  <button id="allStarWeekend" disabled>All-Star Weekend Boost (200 buckets)</button>

  <script src="game.js"></script>
</body>
</html>
